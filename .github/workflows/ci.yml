name: CI

# Инженерная страховка: на каждый push и PR прогоняем проверку типов,
# юнит-тесты чистой логики (включая паритет i18n ru/he/en) и production-сборку
# Next.js. Сборка строже tsc и ловит то, что tsc пропускает. Без БД и секретов.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: '1'
