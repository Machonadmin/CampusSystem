name: CI

# Инженерная страховка: на каждый push и PR прогоняем проверку типов и
# юнит-тесты чистой логики (деньги/баланс, метрики учёбы, даты расписания,
# выбор scope прав). Быстро, без БД и без секретов.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test
